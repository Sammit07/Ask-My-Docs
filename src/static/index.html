<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask My Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 22px; font-weight: 700; color: #58a6ff; }
    header .badge {
      font-size: 11px; background: #1f6feb33; color: #58a6ff;
      border: 1px solid #1f6feb; border-radius: 20px; padding: 2px 10px;
    }
    header .status {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #8b949e;
    }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      gap: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #161b22;
      border-right: 1px solid #30363d;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sidebar h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .6px; }

    .drop-zone {
      border: 2px dashed #30363d;
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #58a6ff;
      background: #1f6feb11;
    }
    .drop-zone .icon { font-size: 32px; margin-bottom: 8px; }
    .drop-zone p { font-size: 13px; color: #8b949e; }
    .drop-zone strong { color: #58a6ff; }
    #file-input { display: none; }

    .file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-item {
      background: #21262d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .status-icon { font-size: 16px; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2ea043; }
    .btn-outline { background: transparent; color: #58a6ff; border: 1px solid #30363d; }
    .btn-outline:hover:not(:disabled) { border-color: #58a6ff; background: #1f6feb11; }

    .stats {
      background: #21262d;
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stats .row { display: flex; justify-content: space-between; }
    .stats .val { color: #58a6ff; font-weight: 600; }

    /* ── Main chat ── */
    .main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 57px);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #484f58;
    }
    .empty-state .big { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; color: #8b949e; margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    .msg { display: flex; flex-direction: column; gap: 6px; max-width: 820px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble {
      background: #21262d;
      border: 1px solid #30363d;
      border-bottom-left-radius: 4px;
    }

    .citation-tag {
      display: inline-block;
      background: #1f6feb22;
      color: #79c0ff;
      border: 1px solid #1f6feb55;
      border-radius: 4px;
      font-size: 11px;
      padding: 1px 5px;
      margin: 0 2px;
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .source-chip {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #8b949e;
    }
    .source-chip span { color: #58a6ff; }

    .coverage-bar {
      height: 3px;
      background: #30363d;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .coverage-fill { height: 100%; background: #3fb950; border-radius: 2px; transition: width .4s; }

    .meta { font-size: 11px; color: #484f58; }

    /* ── Input ── */
    .input-area {
      border-top: 1px solid #30363d;
      padding: 16px 32px;
      background: #161b22;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: #58a6ff; }
    #question {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e1e4e8;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #question::placeholder { color: #484f58; }
    #send-btn {
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: #fff;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover:not(:disabled) { background: #388bfd; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .thinking {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: #8b949e; animation: pulse 1.2s infinite; }
    .dot-pulse:nth-child(2) { animation-delay: .2s; }
    .dot-pulse:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #e1e4e8;
      box-shadow: 0 8px 24px #0008;
      animation: slidein .25s ease;
      z-index: 999;
    }
    .toast.error { border-color: #f85149; color: #f85149; }
    .toast.success { border-color: #3fb950; color: #3fb950; }
    @keyframes slidein { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">📄 Ask My Docs</span>
  <span class="badge">RAG · Hybrid Retrieval</span>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Documents</h2>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <p><strong>Click or drag</strong> to upload</p>
      <p style="margin-top:4px;font-size:11px">PDF · DOCX · TXT · MD</p>
    </div>
    <input type="file" id="file-input" multiple accept=".pdf,.docx,.doc,.txt,.md"/>

    <div class="file-list" id="file-list"></div>

    <button class="btn btn-primary" id="ingest-btn" disabled>⬆ Ingest Documents</button>

    <div class="stats" id="stats">
      <div class="row"><span>Indexed chunks</span><span class="val" id="chunk-count">—</span></div>
      <div class="row"><span>Status</span><span class="val" id="index-status">—</span></div>
    </div>

    <button class="btn btn-outline" onclick="window.open('/docs','_blank')">API Docs ↗</button>
  </aside>

  <!-- Chat -->
  <div class="main">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="big">🔍</div>
        <h3>Ask anything about your documents</h3>
        <p>Upload files on the left, then ask questions here.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="question" rows="1" placeholder="Ask a question about your documents…"></textarea>
        <button id="send-btn" title="Send">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = '';
  let pendingFiles = [];

  // ── Health poll ──────────────────────────────────────────────────────
  async function pollHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.getElementById('status-dot').style.background = '#3fb950';
      document.getElementById('status-text').textContent = 'Online';
      document.getElementById('chunk-count').textContent = d.indexed_chunks;
      document.getElementById('index-status').textContent =
        d.indexed_chunks > 0 ? 'Ready' : 'No docs yet';
    } catch {
      document.getElementById('status-dot').style.background = '#f85149';
      document.getElementById('status-text').textContent = 'Offline';
    }
  }
  pollHealth();
  setInterval(pollHealth, 10000);

  // ── File drag & drop ─────────────────────────────────────────────────
  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    addFiles([...e.target.files]);
    e.target.value = '';
  });

  function addFiles(files) {
    files.forEach(f => {
      if (!pendingFiles.find(p => p.name === f.name)) pendingFiles.push(f);
    });
    renderFileList();
    document.getElementById('ingest-btn').disabled = pendingFiles.length === 0;
  }

  function renderFileList() {
    const el = document.getElementById('file-list');
    el.innerHTML = pendingFiles.map((f, i) => `
      <div class="file-item">
        <span class="status-icon">${fileIcon(f.name)}</span>
        <span class="name" title="${f.name}">${f.name}</span>
        <span style="font-size:11px;color:#484f58">${(f.size/1024).toFixed(0)}KB</span>
        <span style="cursor:pointer;color:#f85149;font-size:13px" onclick="removeFile(${i})">✕</span>
      </div>`).join('');
  }

  function removeFile(i) {
    pendingFiles.splice(i, 1);
    renderFileList();
    document.getElementById('ingest-btn').disabled = pendingFiles.length === 0;
  }

  function fileIcon(name) {
    if (name.endsWith('.pdf')) return '📕';
    if (name.endsWith('.docx') || name.endsWith('.doc')) return '📘';
    if (name.endsWith('.md')) return '📝';
    return '📄';
  }

  // ── Ingest ───────────────────────────────────────────────────────────
  document.getElementById('ingest-btn').addEventListener('click', async () => {
    if (!pendingFiles.length) return;
    const btn = document.getElementById('ingest-btn');
    btn.disabled = true; btn.textContent = '⏳ Ingesting…';

    const form = new FormData();
    pendingFiles.forEach(f => form.append('files', f));

    try {
      const r = await fetch(`${API}/ingest`, { method: 'POST', body: form });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Ingest failed');
      showToast(`✅ ${d.chunks_added} chunks indexed from ${pendingFiles.length} file(s)`, 'success');
      pendingFiles = [];
      renderFileList();
      pollHealth();
    } catch (e) {
      showToast(`❌ ${e.message}`, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '⬆ Ingest Documents';
    }
  });

  // ── Chat ─────────────────────────────────────────────────────────────
  const textarea = document.getElementById('question');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });
  document.getElementById('send-btn').addEventListener('click', sendQuestion);

  async function sendQuestion() {
    const q = textarea.value.trim();
    if (!q) return;

    document.getElementById('empty-state')?.remove();
    textarea.value = '';
    textarea.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', q);
    const thinkingEl = appendThinking();

    try {
      const r = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      const d = await r.json();
      thinkingEl.remove();
      if (!r.ok) throw new Error(d.detail || 'Request failed');
      appendAnswer(d);
    } catch (e) {
      thinkingEl.remove();
      appendMessage('assistant', `⚠️ Error: ${e.message}`);
    } finally {
      document.getElementById('send-btn').disabled = false;
      textarea.focus();
    }
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function appendThinking() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="thinking"><div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function appendAnswer(data) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';

    // Highlight citations in answer text
    const highlighted = escHtml(data.answer).replace(
      /\[SOURCE:[^\]]+\]/g,
      m => `<span class="citation-tag">${m}</span>`
    );

    const coverage = Math.round((data.citation_coverage || 0) * 100);
    const coverageColor = coverage >= 90 ? '#3fb950' : coverage >= 60 ? '#d29922' : '#f85149';

    const sourcesHtml = (data.sources || []).map(s =>
      `<div class="source-chip">${fileIcon(s.source||'')} <span>${s.source || 'unknown'}${s.page > 0 ? ' p.'+s.page : ''}</span></div>`
    ).join('');

    div.innerHTML = `
      <div class="bubble">${highlighted}</div>
      ${sourcesHtml ? `<div class="sources">${sourcesHtml}</div>` : ''}
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <div class="coverage-bar" style="flex:1"><div class="coverage-fill" style="width:${coverage}%;background:${coverageColor}"></div></div>
        <span class="meta" style="color:${coverageColor}">${coverage}% cited</span>
      </div>`;

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function fileIcon(name) {
    if (!name) return '📄';
    if (name.endsWith('.pdf')) return '📕';
    if (name.endsWith('.docx') || name.endsWith('.doc')) return '📘';
    if (name.endsWith('.md')) return '📝';
    return '📄';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type='') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
</script>
</body>
</html>
